<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockerAI // {% block title %}{{ page_name|default('Terminal') }}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/terminal_shell.css">
    <link rel="stylesheet" href="/static/css/premium.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="terminal-shell">
    {% include "sidebar.html" %}
    <div class="main-content main-content-with-sidebar">
        {% block content %}{% endblock %}
    </div>
    <script src="/static/js/terminal_shell.js"></script>
    <script src="/static/js/toast.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
