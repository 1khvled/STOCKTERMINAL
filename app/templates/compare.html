<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockerAI // Peer Comparison</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="/static/css/terminal_shell.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/terminal.css') }}">
    <style>
        .compare-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        
        .compare-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .ticker-input-group {
            display: flex;
            gap: 10px;
        }
        
        .ticker-input-group input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 1rem;
            width: 250px;
            text-transform: uppercase;
        }
        
        .ticker-input-group input:focus {
            outline: none;
            border-color: var(--emerald);
        }
        
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-elevated);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .compare-table th, .compare-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .compare-table th {
            background: var(--bg-header);
            font-weight: 600;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-right: 1px solid var(--border);
        }
        
        .compare-table td {
            border-right: 1px solid var(--border);
            font-family: var(--font-mono);
            color: var(--text-primary);
            transition: background 0.3s;
        }
        
        .compare-table th:first-child, .compare-table td:first-child {
            width: 250px;
            background: var(--bg-header);
            font-weight: 600;
            font-family: var(--font-sans);
            color: var(--text-primary);
            border-right: 2px solid var(--border);
        }
        
        .metric-group {
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.5rem 1rem !important;
            border-top: 2px solid var(--border) !important;
        }
        
        .val-positive { color: var(--emerald); }
        .val-negative { color: var(--ruby); }
        .val-neutral { color: var(--text-secondary); }
        
        .remove-btn {
            background: none;
            border: none;
            color: var(--ruby);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        
        .remove-btn:hover {
            background: rgba(255, 59, 48, 0.1);
        }
        
        .table-header-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .winner-cell {
            background: rgba(48, 209, 88, 0.12) !important;
            border: 1px solid rgba(48, 209, 88, 0.4) !important;
            box-shadow: inset 0 0 10px rgba(48, 209, 88, 0.1);
        }
        
        .loser-cell {
            background: rgba(255, 69, 58, 0.06) !important;
            opacity: 0.8;
        }
    </style>

<body class="terminal-shell">

<div class="main-content term-shell-main">
<div class="compare-container">
    <div class="compare-header">
        <div class="compare-title">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--emerald)" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
                <line x1="15" y1="3" x2="15" y2="21"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="3" y1="15" x2="21" y2="15"/>
            </svg>
            Peer Comparison Matrix
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="/" class="btn" style="background: transparent; border: 1px solid var(--border);">← Back to Hub</a>
            <button class="btn btn-ghost btn-sm" id="share-btn" onclick="copyShareLink()">🔗 Copy Link</button>
            <button class="btn btn-ghost btn-sm" id="pdf-btn" onclick="exportComparePDF()">📄 Export PDF</button>
            <div class="ticker-input-group">
                <input type="text" id="ticker-input" placeholder="Enter Ticker (e.g. AAPL) and press Enter" autocomplete="off">
                <button class="btn btn-primary" onclick="addTicker()">Add to Matrix</button>
            </div>
        </div>
    </div>
    
    <div id="loading-indicator" style="display: none; text-align: center; padding: 2rem; color: var(--text-muted); font-style: italic;">
        Querying database...
    </div>

    <!-- Radar Chart -->
    <div style="display: flex; justify-content: center; align-items: center; width: 100%;">
        <canvas id="compare-radar" width="400" height="380" style="max-width: 400px; display: none; margin-bottom: 2rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px;"></canvas>
    </div>

    <div style="overflow-x: auto; padding-bottom: 2rem;">
        <table class="compare-table" id="compare-table" style="display: none;">
            <thead>
                <tr id="row-headers">
                    <th>Metric</th>
                    <!-- Ticker headers injected here -->
                </tr>
            </thead>
            <tbody id="compare-tbody">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>
    
    <div id="empty-state" style="text-align: center; padding: 4rem; background: var(--bg-elevated); border-radius: 8px; border: 1px dashed var(--border);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom: 1rem;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <div style="font-size: 1.2rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem;">No Tickers Selected</div>
        <div style="color: var(--text-muted);">Enter a ticker in the search bar above to begin the comparison.</div>
    </div>

</div>
</div>
<script src="/static/js/terminal_shell.js"></script>
<script src="/static/js/toast.js"></script>

<script>
    let activeTickers = [];
    
    // Check URL parameters for initial tickers
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const tickersParam = urlParams.get('tickers');
        if (tickersParam) {
            const initialTickers = tickersParam.split(',').filter(t => t.trim() !== '');
            if (initialTickers.length > 0) {
                initialTickers.forEach(t => {
                    if (!activeTickers.includes(t.toUpperCase())) {
                        activeTickers.push(t.toUpperCase());
                    }
                });
                fetchComparison();
            }
        }
    });

    document.getElementById('ticker-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            addTicker();
        }
    });

    function addTicker() {
        const input = document.getElementById('ticker-input');
        const ticker = input.value.trim().toUpperCase();
        
        if (!ticker) return;
        
        if (activeTickers.includes(ticker)) {
            if (typeof showToast === 'function') {
                showToast(`${ticker} is already in the comparison.`, 'warn');
            } else {
                alert(`${ticker} is already in the comparison.`);
            }
            input.value = '';
            return;
        }
        
        if (activeTickers.length >= 5) {
            if (typeof showToast === 'function') {
                showToast("Maximum 5 tickers allowed in the comparison matrix.", 'error');
            } else {
                alert("Maximum 5 tickers allowed in the comparison matrix.");
            }
            return;
        }
        
        activeTickers.push(ticker);
        input.value = '';
        fetchComparison();
        updateUrlParams();
    }
    
    function removeTicker(ticker) {
        activeTickers = activeTickers.filter(t => t !== ticker);
        if (activeTickers.length === 0) {
            document.getElementById('compare-table').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
        } else {
            fetchComparison();
        }
        updateUrlParams();
    }
    
    function updateUrlParams() {
        const url = new URL(window.location);
        if (activeTickers.length > 0) {
            url.searchParams.set('tickers', activeTickers.join(','));
        } else {
            url.searchParams.delete('tickers');
        }
        window.history.replaceState({}, '', url);
    }

    async function fetchComparison() {
        if (activeTickers.length === 0) return;
        
        document.getElementById('loading-indicator').style.display = 'block';
        document.getElementById('compare-table').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
        
        try {
            const res = await fetch(`/api/compare?tickers=${activeTickers.join(',')}`);
            const data = await res.json();
            
            if (data.status === 'success') {
                renderTable(data.results);
            } else {
                if (typeof showToast === 'function') {
                    showToast("Error fetching comparison data: " + data.message, 'error');
                } else {
                    alert("Error fetching comparison data: " + data.message);
                }
            }
        } catch (e) {
            console.error(e);
            if (typeof showToast === 'function') {
                showToast("Failed to connect to comparison engine.", 'error');
            } else {
                alert("Failed to connect to comparison engine.");
            }
        } finally {
            document.getElementById('loading-indicator').style.display = 'none';
        }
    }
    
    function renderTable(results) {
        if (results.length === 0) {
            document.getElementById('compare-table').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
            return;
        }
        
        document.getElementById('compare-table').style.display = 'table';
        const thead = document.getElementById('row-headers');
        const tbody = document.getElementById('compare-tbody');
        
        // Render headers
        let theadHtml = '<th>Metric</th>';
        results.forEach(res => {
            theadHtml += `
                <th>
                    <div class="table-header-cell">
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <span style="font-size:1.2rem; font-weight:800; color:#fff;">${res.ticker}</span>
                            <span style="font-size:0.75rem; color:var(--text-muted); font-family:var(--font-sans);">${res.name}</span>
                        </div>
                        <button class="remove-btn" onclick="removeTicker('${res.ticker}')" title="Remove">×</button>
                    </div>
                </th>
            `;
        });
        thead.innerHTML = theadHtml;
        
        // Define rows
        const rows = [
            { id: 'group1', label: 'Valuation & Price', isGroup: true },
            { id: 'price', label: 'Current Price', format: (val) => formatCurrency(val) },
            { id: 'fair_value', label: 'Implied Fair Value', format: (val) => formatCurrency(val) },
            { id: 'upside', label: 'Upside / Downside', format: (val) => `<span class="${val.startsWith('+') ? 'val-positive' : (val.startsWith('-') ? 'val-negative' : '')}">${val}</span>` },
            
            { id: 'group2', label: 'Multiples', isGroup: true },
            { id: 'pe', label: 'Trailing P/E', format: (val) => formatMultiple(val) },
            { id: 'fwd_pe', label: 'Forward P/E', format: (val) => formatMultiple(val) },
            { id: 'pb', label: 'Price to Book', format: (val) => formatMultiple(val) },
            
            { id: 'group3', label: 'Profitability & Returns', isGroup: true },
            { id: 'roe', label: 'Return on Equity (ROE)', format: (val) => formatPercent(val) },
            { id: 'roa', label: 'Return on Assets (ROA)', format: (val) => formatPercent(val) },
            { id: 'freeCashflow', label: 'Free Cash Flow', format: (val) => formatLargeCurrency(val) },
            
            { id: 'group4', label: 'Solvency & Risk', isGroup: true },
            { id: 'debt_eq', label: 'Debt to Equity', format: (val) => formatMultiple(val) },
            { id: 'altman_z', label: 'Altman Z-Score', format: (val, rowIdx, colIdx, res) => {
                if(val === 'N/A') return val;
                const num = parseFloat(val);
                const colorClass = num > 2.99 ? 'val-positive' : (num < 1.8 ? 'val-negative' : 'val-neutral');
                return `<span class="${colorClass}">${val}</span> <span style="font-size:0.7rem; color:var(--text-muted);">(${res.altman_z_label})</span>`;
            }},
            
            { id: 'group5', label: 'AI Verdict', isGroup: true },
            { id: 'verdict', label: 'StockerAI Verdict', format: (val) => {
                let badgeClass = 'badge-hold';
                if(val === 'STRONG BUY' || val === 'BUY') badgeClass = 'badge-buy';
                else if(val === 'STRONG SELL' || val === 'SELL') badgeClass = 'badge-sell';
                return `<span class="badge ${badgeClass}" style="padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; font-family: var(--font-sans); font-weight: 700; color: #fff; background: ${badgeClass === 'badge-buy' ? 'var(--emerald)' : (badgeClass === 'badge-sell' ? 'var(--ruby)' : 'var(--slate)')}">${val}</span>`;
            }}
        ];
        
        let tbodyHtml = '';
        rows.forEach((row, rowIdx) => {
            if (row.isGroup) {
                tbodyHtml += `<tr><td colspan="${results.length + 1}" class="metric-group">${row.label}</td></tr>`;
            } else {
                tbodyHtml += `<tr><td>${row.label}</td>`;
                results.forEach((res, colIdx) => {
                    const rawVal = res[row.id];
                    let displayVal = rawVal;
                    if (rawVal !== 'N/A' && rawVal !== null && rawVal !== undefined) {
                        displayVal = row.format ? row.format(rawVal, rowIdx, colIdx, res) : rawVal;
                    } else {
                        displayVal = '<span class="val-neutral">N/A</span>';
                    }
                    tbodyHtml += `<td>${displayVal}</td>`;
                });
                tbodyHtml += `</tr>`;
            }
        });
        
        tbody.innerHTML = tbodyHtml;
        
        // Apply Winner Highlighting and Radar Drawing
        highlightTableRows();
        drawRadarChart(results);
    }
    
    // Formatting helpers
    function formatCurrency(val) {
        if(typeof val === 'number') return '$' + val.toFixed(2);
        return val;
    }
    function formatMultiple(val) {
        if(typeof val === 'number') return val.toFixed(2) + 'x';
        return val;
    }
    function formatPercent(val) {
        if(typeof val === 'number') {
            const isNegative = val < 0;
            return `<span class="${isNegative ? 'val-negative' : 'val-positive'}">${(val * 100).toFixed(1)}%</span>`;
        }
        return val;
    }
    function formatLargeCurrency(val) {
        if(typeof val === 'number') {
            const sign = val < 0 ? '-' : '';
            const abs = Math.abs(val);
            let color = val < 0 ? 'val-negative' : 'val-positive';
            if (abs >= 1e9) return `<span class="${color}">${sign}$${(abs / 1e9).toFixed(2)}B</span>`;
            if (abs >= 1e6) return `<span class="${color}">${sign}$${(abs / 1e6).toFixed(2)}M</span>`;
            return `<span class="${color}">${sign}$${abs.toLocaleString()}</span>`;
        }
        return val;
    }

    function copyShareLink() {
        if (activeTickers.length === 0) {
            showToast('No tickers selected to share.', 'warn');
            return;
        }
        navigator.clipboard.writeText(window.location.href);
        showToast('Comparison matrix link copied to clipboard!', 'success');
    }

    function exportComparePDF() {
        if (activeTickers.length === 0) {
            showToast('No tickers selected to export.', 'warn');
            return;
        }
        window.open(`/api/compare/export-pdf?tickers=${activeTickers.join(',')}`);
        showToast('Compiling PDF matrix...', 'info');
    }

    function highlightTableRows() {
        const tbody = document.getElementById('compare-tbody');
        if (!tbody) return;
        
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
            if (row.querySelector('.metric-group') || row.cells.length <= 2) return;
            
            const label = row.cells[0].innerText.trim();
            let higherIsBetter = true;
            
            if (label.includes('P/E') || label.includes('Price to Book') || label.includes('Debt to Equity')) {
                higherIsBetter = false;
            } else if (label.includes('Current Price') || label.includes('Implied Fair Value') || label.includes('StockerAI Verdict') || label.includes('Free Cash Flow')) {
                // Ignore highlighting for basic pricing and categorical verdicts
                return;
            }
            
            const cells = Array.from(row.cells).slice(1);
            const values = cells.map(cell => {
                let text = cell.innerText.trim();
                text = text.replace(/[\$%x,]/g, '');
                const val = parseFloat(text);
                return isNaN(val) ? null : val;
            });
            
            let bestVal = higherIsBetter ? -Infinity : Infinity;
            let worstVal = higherIsBetter ? Infinity : -Infinity;
            let bestIdx = -1;
            let worstIdx = -1;
            
            values.forEach((v, idx) => {
                if (v === null) return;
                if (higherIsBetter) {
                    if (v > bestVal) { bestVal = v; bestIdx = idx; }
                    if (v < worstVal) { worstVal = v; worstIdx = idx; }
                } else {
                    if (v < bestVal) { bestVal = v; bestIdx = idx; }
                    if (v > worstVal) { worstVal = v; worstIdx = idx; }
                }
            });
            
            if (bestIdx !== -1 && worstIdx !== -1 && bestVal !== worstVal) {
                cells.forEach((cell, idx) => {
                    if (idx === bestIdx) {
                        cell.classList.add('winner-cell');
                    } else if (idx === worstIdx) {
                        cell.classList.add('loser-cell');
                    }
                });
            }
        });
    }

    function drawRadarChart(results) {
        const canvas = document.getElementById('compare-radar');
        if (!canvas) return;
        
        if (results.length < 2) {
            canvas.style.display = 'none';
            return;
        }
        
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        
        const center = { x: W / 2, y: H / 2 - 10 };
        const radius = 120;
        const axes = ['Valuation', 'Profitability', 'Safety', 'Growth', 'Cash Gen'];
        const numAxes = axes.length;
        
        // Draw pentagonal background grids
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        for (let level = 1; level <= 5; level++) {
            const r = (radius / 5) * level;
            ctx.beginPath();
            for (let i = 0; i < numAxes; i++) {
                const angle = (i * 2 * Math.PI) / numAxes - Math.PI / 2;
                const x = center.x + r * Math.cos(angle);
                const y = center.y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }
        
        // Draw axis lines and labels
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillStyle = 'var(--text-muted)';
        ctx.font = 'bold 10px var(--font-sans)';
        ctx.textAlign = 'center';
        
        for (let i = 0; i < numAxes; i++) {
            const angle = (i * 2 * Math.PI) / numAxes - Math.PI / 2;
            const x = center.x + radius * Math.cos(angle);
            const y = center.y + radius * Math.sin(angle);
            
            ctx.beginPath();
            ctx.moveTo(center.x, center.y);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            const labelX = center.x + (radius + 20) * Math.cos(angle);
            const labelY = center.y + (radius + 15) * Math.sin(angle) + 4;
            ctx.fillText(axes[i], labelX, labelY);
        }
        
        // Extract metrics
        const parsed = results.map(res => {
            const pe = parseFloat(res.pe);
            const roe = parseFloat(res.roe);
            const altman = parseFloat(res.altman_z);
            const upside = parseFloat(res.upside.replace('%', ''));
            const fcf = parseFloat(res.freeCashflow);
            
            return {
                ticker: res.ticker,
                val: isNaN(pe) || pe <= 0 ? 0.02 : 1 / pe,
                prof: isNaN(roe) ? 0 : roe,
                safe: isNaN(altman) ? 0 : altman,
                growth: isNaN(upside) ? 0 : upside,
                cash: isNaN(fcf) ? 0 : fcf
            };
        });
        
        const keys = ['val', 'prof', 'safe', 'growth', 'cash'];
        const maxVals = {};
        const minVals = {};
        
        keys.forEach(k => {
            const vals = parsed.map(p => p[k]);
            maxVals[k] = Math.max(...vals, 0.0001);
            minVals[k] = Math.min(...vals, 0);
        });
        
        const colors = {
            0: { fill: 'rgba(48, 209, 88, 0.15)', stroke: 'rgba(48, 209, 88, 0.8)' },
            1: { fill: 'rgba(10, 132, 255, 0.15)', stroke: 'rgba(10, 132, 255, 0.8)' },
            2: { fill: 'rgba(255, 159, 10, 0.15)', stroke: 'rgba(255, 159, 10, 0.8)' },
            3: { fill: 'rgba(191, 90, 242, 0.15)', stroke: 'rgba(191, 90, 242, 0.8)' },
            4: { fill: 'rgba(255, 69, 58, 0.15)', stroke: 'rgba(255, 69, 58, 0.8)' }
        };
        
        parsed.forEach((p, idx) => {
            const color = colors[idx] || colors[0];
            const normalized = keys.map(k => {
                const max = maxVals[k];
                const min = minVals[k];
                const range = max - min;
                const score = range > 0 ? (p[k] - min) / range : 0.5;
                return 0.15 + score * 0.85;
            });
            
            ctx.beginPath();
            for (let i = 0; i < numAxes; i++) {
                const angle = (i * 2 * Math.PI) / numAxes - Math.PI / 2;
                const r = radius * normalized[i];
                const x = center.x + r * Math.cos(angle);
                const y = center.y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            
            ctx.fillStyle = color.fill;
            ctx.fill();
            
            ctx.strokeStyle = color.stroke;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw Legend
            const legendX = 20 + idx * 75;
            const legendY = H - 10;
            ctx.fillStyle = color.stroke;
            ctx.beginPath();
            ctx.arc(legendX, legendY - 3, 4, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'var(--text-primary)';
            ctx.font = '10px var(--font-mono)';
            ctx.textAlign = 'left';
            ctx.fillText(p.ticker, legendX + 8, legendY);
        });
    }
</script>
